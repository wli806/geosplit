<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>场地基础信息总览 — V2 slice 1-1</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{--bg:#f6f8fa;--line:#e3e6ea;--muted:#8a929b;--accent:#1a73e8;}
  html,body{margin:0;height:100%;font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif;color:#1f2329;}
  #wrap{display:flex;height:100vh;}
  #side{width:340px;flex:0 0 340px;background:var(--bg);border-right:1px solid var(--line);
        box-sizing:border-box;overflow-y:auto;padding:14px;}
  #view{flex:1;position:relative;}
  #map{position:absolute;inset:0;}
  h1{font-size:15px;margin:0 0 4px;}
  .sub{font-size:11px;color:var(--muted);margin-bottom:12px;}
  label.fld{font-size:11px;color:#555;display:block;margin-top:8px;}
  #addr{width:100%;padding:8px;box-sizing:border-box;border:1px solid #cfd4da;border-radius:6px;font-size:13px;}
  button{margin-top:10px;width:100%;padding:9px;border:0;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;}
  button:disabled{background:#9bb8e8;}
  #status{margin-top:8px;font-size:12px;color:var(--muted);min-height:16px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:12px;}
  .card h2{font-size:13px;margin:0 0 8px;color:#333;}
  .kv{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:3px 0;border-bottom:1px dashed #eef0f2;}
  .kv:last-child{border-bottom:0;}
  .kv .k{color:#555;}.kv .v{font-weight:600;text-align:right;}
  .src{font-size:10px;color:var(--muted);margin-top:2px;}
  .warn{font-size:10.5px;color:#b26a00;background:#fff7e6;border:1px solid #ffe2a8;border-radius:5px;padding:5px 7px;margin-top:6px;}
  .grp{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 3px;}
  .lyr{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0;cursor:pointer;}
  .lyr input{flex:0 0 auto;width:auto;margin:0;}
  .lyr .sw{width:13px;height:13px;border-radius:3px;flex:0 0 auto;border:1px solid rgba(0,0,0,.2);}
  .lyr .nm{flex:1;}
  .lyr .note{flex:0 0 auto;font-size:10px;color:var(--muted);}
  .basebar{display:flex;gap:6px;margin-top:6px;}
  .basebar button{flex:1;margin:0;padding:6px;font-size:12px;background:#fff;color:#333;border:1px solid #cfd4da;}
  .basebar button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .attr{font-size:10px;color:var(--muted);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div id="wrap">
  <div id="side">
    <h1>场地基础信息总览</h1>
    <div class="sub">V2 · slice 1-1 · 数据带来源标注</div>
    <label class="fld">地址</label>
    <input id="addr" value="11 Malmo Place, Massey"/>
    <button id="go">查询</button>
    <div id="status"></div>
    <div id="info"></div>
    <div class="card">
      <h2>图层</h2>
      <div class="grp">底图</div>
      <div class="basebar">
        <button id="b-street" class="on">街道</button>
        <button id="b-aerial">航拍</button>
      </div>
      <div id="layerlist"></div>
    </div>
    <div class="attr" id="attr"></div>
  </div>
  <div id="view"><div id="map"></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
